name: ImmortalWrt 全自动编译 (最终稳定版)

on:
  workflow_dispatch:

jobs:
  编译固件任务:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：拉取 ImmortalWrt 源码
      - name: 拉取源码仓库
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      # 步骤 2：安装系统基础依赖（解决环境问题）
      - name: 安装系统依赖和Python库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync python3-pip
          # 下面这行是解决你之前遇到的 "python3-xxx does not exist" 的关键
          pip3 install pyyaml pygments markdown pyunidecode

      # 步骤 3：添加 5G 模组支持（修复克隆问题）
      - name: 添加 5G-Modem-Support 插件
        run: |
          rm -rf package/5g-modem-support
          # 明确指定地址，防止出错
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      # 步骤 4：更新并安装软件源
      - name: 更新 Feeds 并安装
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤 5：应用你的配置文件
      - name: 加载 PSG1218A 配置文件
        run: |
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      # 步骤 6：下载软件包源码（减少编译中断概率）
      - name: 预下载所有软件包源码
        run: make download -j$(nproc)

      # 步骤 7：开始正式编译（开启详细日志）
      - name: 开始多线程编译
        run: make -j$(nproc) V=s

      # 步骤 8：收集固件（兜底方案，绝不落空）
      - name: 收集生成的固件文件
        run: |
          mkdir -p firmware

          echo "正在扫描 bin 目录寻找固件..."
          # 不管固件藏得多深，只要名字对，统统抓出来
          find bin -type f -name "*psg1218a*.bin" -exec cp {} firmware/ \;

          if [ -z "$(ls firmware)" ]; then
            echo "::warning::未找到固件文件！正在生成目录结构清单用于排错..."
            ls -lahR bin > firmware/debug_bin_structure.txt
          else
            echo "成功找到以下固件："
            ls -lh firmware
          fi

      # 步骤 9：上传固件
      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-稳定版
          path: firmware/*
          if-no-files-found: warn
