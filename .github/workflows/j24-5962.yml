name: 🚀 ImmortalWrt 编译 (极路由4增强版 HC5962 - 无警告版)

on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    # ✅ 解决 Node.js 20 报警：强制使用 Node.js 24 环境
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📦 1. 拉取源码
        uses: actions/checkout@v4

      - name: ⚙️ 2. 准备环境与依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk \
            zlib1g-dev git python3 python3-pip unzip wget curl
          
          pip3 install --break-system-packages pyyaml pygments markdown Unidecode

      - name: 📥 3. 添加 5G 插件
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: 🔌 4. 更新 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📝 5. 配置编译选项 (关键修改点)
        run: |
          # --- 关键修改开始 ---
          # 1. 清空旧配置，重新开始
          rm -f .config
          
          # 2. 写入极路由4增强版 (HC5962) 的专用配置
          # 这个设备属于 ramips 架构，mt7621 芯片
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          # DEVICE 后面的代号必须是 hiwifi_hc5962 (这是OpenWrt官方的命名)
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y" >> .config
          
          # 3. 强制使用 Squashfs 格式 (这才是生成 Factory 固件的关键)
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          
          # 4. 生成默认配置
          make defconfig
          # --- 关键修改结束 ---

      - name: 📥 6. 下载源码包
        run: make download -j$(nproc)

      - name: 🏗️ 7. 开始编译
        run: make -j$(nproc) V=s

      - name: 🧹 8. 收集固件
        run: |
          mkdir -p firmware_output
          
          # 搜索所有 bin 文件
          find bin -type f -name "*.bin" -exec cp {} firmware_output/ \;
          
          # 列出文件，检查是否生成了 factory 文件
          if ls firmware_output/*.bin 1> /dev/null 2>&1; then
            echo "✅ 成功找到固件："
            ls -lh firmware_output/
          else
            echo "❌ 错误：未找到固件文件！"
            find bin -type f
            exit 1
          fi

      - name: 📤 9. 上传固件
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          # ✅ 修改了输出名称，一眼就能看出是极路由的
          name: immortalwrt-hc5962-极路由4增强版-Factory固件
          path: firmware_output/
          retention-days: 7
