name: ImmortalWrt 极速编译 (最终修正版)

on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      - name: 安装系统依赖和 Python 库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync python3-pip
          
          # 修复之前的报错：pyunidecode -> Unidecode (首字母大写)
          # --break-system-packages 用于解决 Ubuntu 系统 Python 环境的权限问题
          pip3 install --break-system-packages pyyaml pygments markdown Unidecode

      - name: 添加 5G-Modem-Support 插件
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: 更新并安装 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载 PSG1218A 配置文件
        run: |
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      - name: 下载软件包源码
        run: make download -j$(nproc)

      - name: 开始多线程编译
        run: make -j$(nproc) V=s

      - name: 收集固件文件
        run: |
          mkdir -p firmware
          echo "正在扫描 bin 目录寻找固件..."
          find bin -type f -name "*psg1218a*.bin" -exec cp {} firmware/ \;
          
          if [ -z "$(ls firmware)" ]; then
            echo "::warning::未找到固件文件！"
            ls -lahR bin > firmware/debug_log.txt
          else
            echo "成功找到以下固件："
            ls -lh firmware
          fi

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-最终版
          path: firmware/*
          if-no-files-found: warn
